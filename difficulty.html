<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Card Game - Choose Difficulty</title>
    <link rel="stylesheet" href="CSS/difficulty.css">
</head>
<body>

    <main>

       <section class="card">

    <!-- Difficulty Selection Screen -->
    <div id="difficulty-screen">

        <a href="index.html"><button class="back-btn">← Back</button></a>

        <h1>Choose Difficulty</h1>

        <p class="subtitle">
            Select a level to challenge your memory!
        </p>

        <div class="difficulty-container">

            <div class="difficulty-card" id="easy-level">
                <h2>🟢 Easy</h2>
                <p>4 × 4 Cards</p>
                <small>Recommended for Beginners</small>
            </div>

            <div class="difficulty-card" id="medium-level">
                <h2>🟡 Medium</h2>
                <p>4 × 6 Cards</p>
                <small>Challenge Yourself</small>
            </div>

            <div class="difficulty-card" id="hard-level">
                <h2>🔴 Hard</h2>
                <p>6 × 6 Cards</p>
                <small>Memory Master</small>
            </div>

        </div>

    </div>

    <!-- Game Screen -->
   <div id="game-screen">

    <div class="game-header">

        <button id="game-back">← Back</button>

        <h1>Memory Card Game</h1>

        <button id="restart-btn">Restart</button>

    </div>

    <div class="game-info">

        <p>⏱ Time : <span id="timer">00:00</span></p>

        <p>🎯 Moves : <span id="moves">0</span></p>

    </div>
    <div class="score-board">

    <div class="player-score">
        😊 You : <span id="player-score">0</span>
    </div>

    <div class="computer-score">
        🤖 Computer : <span id="computer-score">0</span>
    </div>

</div>

<h3 id="turn-text">😊 Your Turn</h3>

    <div id="game-board">

    </div>

</div>

</section>


    </main>

</body>
<script src="JS/game.js"></script>
</html>
